<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Analytics — Apex Marketing Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0a0f;
    --surface:#111118;
    --surface-2:#15151f;
    --primary:#378ADD;
    --primary-30: rgba(55,138,221,0.3);
    --primary-15: rgba(55,138,221,0.12);
    --accent:#1D9E75;
    --text:#e8e9ee;
    --text-dim:#9498a5;
    --text-faint:#5d6170;
    --border:#1f2030;
    --danger:#d9534f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.brand{font-family:'Syne',sans-serif;}
  .mono{font-family:'DM Mono', monospace;}

  a{color:inherit;text-decoration:none;}

  /* Layout */
  .app{
    display:flex;
    align-items:flex-start;
    min-height:100vh;
  }

  .sidebar{
    width:220px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border);
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    padding:28px 20px;
    display:flex;
    flex-direction:column;
    z-index:10;
  }
  .brand{
    font-size:20px;
    font-weight:800;
    color:var(--text);
    margin-bottom:4px;
    letter-spacing:0.3px;
    line-height:1.2;
  }
  .brand span{color:var(--primary);display:block;}
  .brand-sub{
    font-size:11px;
    color:var(--text-faint);
    margin-bottom:36px;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .nav{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .nav a{
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:500;
    color:var(--text-faint);
    cursor:not-allowed;
    user-select:none;
  }
  .nav a.active{
    background:var(--primary-15);
    color:var(--primary);
    border:1px solid var(--primary-30);
  }
  .sidebar-footer{
    margin-top:auto;
    font-size:11px;
    color:var(--text-faint);
  }

  .main{
    margin-left:220px;
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
  }

  /* Header */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.7);
    backdrop-filter:blur(6px);
    position:sticky;
    top:0;
    z-index:5;
    flex-wrap:wrap;
    gap:12px;
  }
  .topbar h1{
    font-size:20px;
    margin:0;
    font-weight:700;
  }
  .topbar-right{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .last-updated{
    font-size:12px;
    color:var(--text-faint);
  }
  .refresh-btn{
    background:var(--primary-15);
    border:1px solid var(--primary-30);
    color:var(--primary);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    font-weight:600;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .refresh-btn:hover{background:rgba(55,138,221,0.22);}
  .refresh-btn:active{transform:scale(0.97);}
  .refresh-btn svg{width:14px;height:14px;}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .content{
    padding:32px;
    display:flex;
    flex-direction:column;
    gap:24px;
  }

  /* Fade up animation */
  .fade-up{
    opacity:0;
    transform:translateY(14px);
    animation:fadeUp 0.55s ease forwards;
  }
  @keyframes fadeUp{
    to{opacity:1;transform:translateY(0);}
  }

  /* Cards */
  .card{
    background:var(--surface);
    border:1px solid var(--primary-30);
    border-radius:14px;
    padding:20px;
    min-width:0;
  }
  .card-title{
    font-size:13px;
    font-weight:600;
    color:var(--text-dim);
    margin:0 0 14px 0;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }

  /* KPI grid */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:16px;
  }
  .kpi-card{
    background:var(--surface);
    border:1px solid var(--primary-30);
    border-radius:14px;
    padding:18px 18px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .kpi-label{
    font-size:12px;
    color:var(--text-dim);
    font-weight:500;
  }
  .kpi-value{
    font-size:24px;
    font-weight:500;
    font-family:'DM Mono',monospace;
    color:var(--text);
  }
  .kpi-delta{
    font-size:12px;
    font-family:'DM Mono',monospace;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .kpi-delta.up{color:var(--accent);}
  .kpi-delta.down{color:var(--danger);}

  /* Skeletons */
  .skeleton{
    background:linear-gradient(90deg, var(--surface-2) 25%, #1c1d2a 37%, var(--surface-2) 63%);
    background-size:400% 100%;
    animation:shimmer 1.4s ease infinite;
    border-radius:6px;
  }
  @keyframes shimmer{
    0%{background-position:100% 50%;}
    100%{background-position:0 50%;}
  }
  .skeleton-line{height:12px;width:60%;margin-bottom:10px;}
  .skeleton-value{height:24px;width:80%;}
  .skeleton-chart{height:260px;width:100%;}

  /* Charts row */
  .charts-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .chart-wrap{
    position:relative;
    height:280px;
  }

  .channel-card .chart-wrap{height:300px;}

  /* Key wins */
  .wins-list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .wins-list li{
    display:flex;
    gap:12px;
    font-size:14px;
    color:var(--text);
    line-height:1.5;
  }
  .win-dot{
    flex-shrink:0;
    margin-top:6px;
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 3px rgba(29,158,117,0.18);
  }
  .win-dot.primary{background:var(--primary);box-shadow:0 0 0 3px rgba(55,138,221,0.18);}

  .bottom-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr;
    gap:20px;
  }

  .badge{
    position:fixed;
    bottom:18px;
    right:22px;
    background:var(--surface);
    border:1px solid var(--primary-30);
    color:var(--text-faint);
    font-size:11px;
    font-family:'DM Mono',monospace;
    padding:8px 14px;
    border-radius:999px;
    z-index:20;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .badge .dot{
    width:6px;height:6px;border-radius:50%;background:var(--accent);
  }

  .error-banner{
    background:rgba(217,83,79,0.08);
    border:1px solid rgba(217,83,79,0.35);
    color:#e08a87;
    font-size:13px;
    padding:10px 16px;
    border-radius:10px;
  }

  /* Responsive */
  @media (max-width:1100px){
    .kpi-grid{grid-template-columns:repeat(3,1fr);}
    .charts-row{grid-template-columns:1fr;}
    .bottom-grid{grid-template-columns:1fr;}
  }
  @media (max-width:760px){
    .app{flex-direction:column;}
    .sidebar{
      position:relative;
      width:100%;
      height:auto;
      flex-direction:row;
      align-items:center;
      flex-wrap:wrap;
      padding:16px 18px;
      border-right:none;
      border-bottom:1px solid var(--border);
    }
    .sidebar-footer{display:none;}
    .nav{flex-direction:row;flex-wrap:wrap;margin-left:auto;}
    .main{margin-left:0;}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .content{padding:20px;}
    .topbar{padding:16px 20px;}
  }
  @media (max-width:480px){
    .kpi-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="brand">Lumen<span>Analytics</span></div>
      <div class="brand-sub">Insights Platform</div>
    </div>
    <nav class="nav">
      <a class="active" title="Overview">Overview</a>
      <a title="Coming soon">Traffic</a>
      <a title="Coming soon">Marketing</a>
      <a title="Coming soon">Conversions</a>
      <a title="Coming soon">AI Insights</a>
    </nav>
    <div class="sidebar-footer">&copy; 2026 Lumen Analytics</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1>Apex Marketing Group</h1>
      <div class="topbar-right">
        <span class="last-updated mono" id="lastUpdated">Last updated: —</span>
        <button class="refresh-btn" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Refresh
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <div id="errorBanner" class="error-banner fade-up" style="display:none;"></div>

      <div class="kpi-grid" id="kpiGrid"></div>

      <div class="charts-row">
        <div class="card fade-up" id="revenueCard">
          <h3 class="card-title">Revenue Trend</h3>
          <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
        </div>
        <div class="card fade-up" id="leadsCard">
          <h3 class="card-title">Leads Trend</h3>
          <div class="chart-wrap"><canvas id="leadsChart"></canvas></div>
        </div>
      </div>

      <div class="bottom-grid">
        <div class="card channel-card fade-up" id="channelCard">
          <h3 class="card-title">Channel Breakdown — Ad Spend vs Leads</h3>
          <div class="chart-wrap"><canvas id="channelChart"></canvas></div>
        </div>
        <div class="card fade-up" id="winsCard">
          <h3 class="card-title">Key Wins This Month</h3>
          <ul class="wins-list" id="winsList"></ul>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="badge"><span class="dot"></span>Powered by Lumen Analytics</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTKTM-3J4tXw3CrW6dKpuqX-M2SerCql34QjuwpQkFyrDiqF5d5NDUALmaNbjYC56vEg37vTd7SFtTl/pub?output=csv";

const FALLBACK = {
  months: ["Jan 2026","Feb 2026","Mar 2026","Apr 2026","May 2026","Jun 2026"],
  adSpend: [8200,8500,9100,8800,9600,10200],
  leads: [164,179,202,188,215,241],
  costPerLead: [50.00,47.49,45.05,46.81,44.65,42.32],
  converted: [12,14,17,15,19,22],
  conversionRate: [7.3,7.8,8.4,8.0,8.8,9.1],
  revenue: [18000,21500,26800,23200,29500,34800],
  roas: [2.2,2.5,2.9,2.6,3.1,3.4]
};

// Synthetic channel split (proportional) since CSV has no per-channel data
const CHANNEL_WEIGHTS = {
  "Google Ads": { spend: 0.46, leads: 0.42 },
  "Meta Ads":   { spend: 0.34, leads: 0.38 },
  "TikTok Ads": { spend: 0.20, leads: 0.20 }
};

let charts = {};

const fmtCurrency = n => "$" + Math.round(n).toLocaleString("en-US");
const fmtCurrencyDec = n => "$" + n.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtNumber = n => Math.round(n).toLocaleString("en-US");
const fmtPercent = n => n.toFixed(1) + "%";
const fmtX = n => n.toFixed(2) + "x";

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const rows = lines.slice(1).map(line => {
    // simple CSV split (no quoted commas expected in this data)
    return line.split(",").map(c => c.trim());
  }).filter(r => r.length >= 8 && r[0] !== "");

  const data = {
    months: [], adSpend: [], leads: [], costPerLead: [],
    converted: [], conversionRate: [], revenue: [], roas: []
  };
  rows.forEach(r => {
    data.months.push(r[0]);
    data.adSpend.push(parseFloat(r[1]));
    data.leads.push(parseFloat(r[2]));
    data.costPerLead.push(parseFloat(r[3]));
    data.converted.push(parseFloat(r[4]));
    data.conversionRate.push(parseFloat(r[5]));
    data.revenue.push(parseFloat(r[6]));
    data.roas.push(parseFloat(r[7]));
  });
  return data;
}

function showSkeletons(){
  const kpiGrid = document.getElementById("kpiGrid");
  kpiGrid.innerHTML = "";
  for(let i=0;i<6;i++){
    const div = document.createElement("div");
    div.className = "kpi-card fade-up";
    div.style.animationDelay = (i*0.05)+"s";
    div.innerHTML = `
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-value"></div>
    `;
    kpiGrid.appendChild(div);
  }
  ["revenueCard","leadsCard","channelCard"].forEach(id=>{
    const wrap = document.querySelector("#"+id+" .chart-wrap");
    wrap.innerHTML = '<div class="skeleton skeleton-chart"></div>';
  });
  const winsList = document.getElementById("winsList");
  winsList.innerHTML = "";
  for(let i=0;i<3;i++){
    const li = document.createElement("li");
    li.innerHTML = '<div class="skeleton" style="height:14px;width:100%;"></div>';
    winsList.appendChild(li);
  }
}

function restoreChartCanvas(id, canvasId){
  const wrap = document.querySelector("#"+id+" .chart-wrap");
  wrap.innerHTML = `<canvas id="${canvasId}"></canvas>`;
}

function buildKPIs(data){
  const last = data.months.length - 1;
  const prev = last > 0 ? last - 1 : last;

  const totalLeads = data.leads[last];
  const kpis = [
    {
      label:"Ad Spend",
      value: fmtCurrency(data.adSpend[last]),
      delta: pctDelta(data.adSpend[prev], data.adSpend[last])
    },
    {
      label:"Revenue Generated",
      value: fmtCurrency(data.revenue[last]),
      delta: pctDelta(data.revenue[prev], data.revenue[last])
    },
    {
      label:"Total Leads",
      value: fmtNumber(totalLeads),
      delta: pctDelta(data.leads[prev], data.leads[last])
    },
    {
      label:"Avg ROAS",
      value: fmtX(data.roas[last]),
      delta: pctDelta(data.roas[prev], data.roas[last])
    },
    {
      label:"Cost Per Lead",
      value: fmtCurrencyDec(data.costPerLead[last]),
      delta: pctDelta(data.costPerLead[prev], data.costPerLead[last], true)
    },
    {
      label:"Conversion Rate",
      value: fmtPercent(data.conversionRate[last]),
      delta: pctDelta(data.conversionRate[prev], data.conversionRate[last])
    }
  ];

  const kpiGrid = document.getElementById("kpiGrid");
  kpiGrid.innerHTML = "";
  kpis.forEach((k,i)=>{
    const div = document.createElement("div");
    div.className = "kpi-card fade-up";
    div.style.animationDelay = (i*0.06)+"s";
    div.innerHTML = `
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value mono">${k.value}</div>
      <div class="kpi-delta ${k.delta.dir} mono">${k.delta.arrow} ${k.delta.text}</div>
    `;
    kpiGrid.appendChild(div);
  });
}

function pctDelta(prevVal, curVal, lowerIsBetter=false){
  if(prevVal === curVal || prevVal === 0){
    return {dir:"up", arrow:"→", text:"flat vs last month"};
  }
  const change = ((curVal - prevVal) / Math.abs(prevVal)) * 100;
  const good = lowerIsBetter ? change < 0 : change > 0;
  const arrow = change > 0 ? "▲" : "▼";
  return {
    dir: good ? "up" : "down",
    arrow,
    text: Math.abs(change).toFixed(1) + "% vs last month"
  };
}

function destroyChart(key){
  if(charts[key]){ charts[key].destroy(); delete charts[key]; }
}

function buildCharts(data){
  restoreChartCanvas("revenueCard","revenueChart");
  restoreChartCanvas("leadsCard","leadsChart");
  restoreChartCanvas("channelCard","channelChart");

  const primary = getCss("--primary");
  const accent = getCss("--accent");
  const textDim = getCss("--text-dim");
  const border = getCss("--border");

  Chart.defaults.font.family = "'DM Mono', monospace";
  Chart.defaults.color = textDim;

  destroyChart("revenue");
  charts.revenue = new Chart(document.getElementById("revenueChart"), {
    type:"line",
    data:{
      labels: data.months,
      datasets:[{
        label:"Revenue",
        data: data.revenue,
        borderColor: accent,
        backgroundColor: hexToRgba(accent,0.12),
        pointBackgroundColor: accent,
        pointRadius:4,
        tension:0.35,
        fill:true,
        borderWidth:2
      }]
    },
    options: lineOptions(border, textDim, fmtCurrency)
  });

  destroyChart("leads");
  charts.leads = new Chart(document.getElementById("leadsChart"), {
    type:"line",
    data:{
      labels: data.months,
      datasets:[{
        label:"Leads",
        data: data.leads,
        borderColor: primary,
        backgroundColor: hexToRgba(primary,0.12),
        pointBackgroundColor: primary,
        pointRadius:4,
        tension:0.35,
        fill:true,
        borderWidth:2
      }]
    },
    options: lineOptions(border, textDim, fmtNumber)
  });

  const last = data.months.length - 1;
  const totalSpend = data.adSpend[last];
  const totalLeads = data.leads[last];
  const channels = Object.keys(CHANNEL_WEIGHTS);
  const spendData = channels.map(c => Math.round(totalSpend * CHANNEL_WEIGHTS[c].spend));
  const leadsData = channels.map(c => Math.round(totalLeads * CHANNEL_WEIGHTS[c].leads));

  destroyChart("channel");
  charts.channel = new Chart(document.getElementById("channelChart"), {
    type:"bar",
    data:{
      labels: channels,
      datasets:[
        {
          label:"Ad Spend ($)",
          data: spendData,
          backgroundColor: hexToRgba(primary,0.75),
          borderRadius:6,
          yAxisID:"y"
        },
        {
          label:"Leads",
          data: leadsData,
          backgroundColor: hexToRgba(accent,0.75),
          borderRadius:6,
          yAxisID:"y1"
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:"index", intersect:false},
      plugins:{
        legend:{ labels:{ color: textDim, font:{family:"'DM Sans', sans-serif", size:12} } }
      },
      scales:{
        x:{ grid:{color:border}, ticks:{color:textDim, font:{family:"'DM Sans', sans-serif"}} },
        y:{ position:"left", grid:{color:border}, ticks:{color:textDim, callback:v=>fmtCurrency(v)} },
        y1:{ position:"right", grid:{drawOnChartArea:false}, ticks:{color:textDim} }
      }
    }
  });
}

function lineOptions(border, textDim, yFormatter){
  return {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{ legend:{ display:false } },
    scales:{
      x:{ grid:{color:border}, ticks:{color:textDim, font:{family:"'DM Sans', sans-serif"}} },
      y:{ grid:{color:border}, ticks:{color:textDim, callback:v=>yFormatter(v)} }
    }
  };
}

function hexToRgba(hex, alpha){
  const c = hex.replace("#","");
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getCss(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function buildWins(data){
  const last = data.months.length - 1;
  const prev = last > 0 ? last - 1 : last;
  const winsList = document.getElementById("winsList");
  winsList.innerHTML = "";

  const revGrowth = data.revenue[prev] ? (((data.revenue[last]-data.revenue[prev])/data.revenue[prev])*100) : 0;
  const cplDrop = data.costPerLead[prev] ? (((data.costPerLead[prev]-data.costPerLead[last])/data.costPerLead[prev])*100) : 0;

  const wins = [
    `Revenue ${revGrowth>=0?"grew":"declined"} <strong>${Math.abs(revGrowth).toFixed(1)}%</strong> month-over-month, reaching <strong class="mono">${fmtCurrency(data.revenue[last])}</strong> in ${data.months[last]}.`,
    `Cost per lead ${cplDrop>=0?"improved":"increased"} by <strong>${Math.abs(cplDrop).toFixed(1)}%</strong>, now sitting at <strong class="mono">${fmtCurrencyDec(data.costPerLead[last])}</strong> per lead.`,
    `Generated <strong class="mono">${fmtNumber(data.leads[last])}</strong> leads at an average ROAS of <strong class="mono">${fmtX(data.roas[last])}</strong>, with a conversion rate of <strong class="mono">${fmtPercent(data.conversionRate[last])}</strong>.`
  ];

  wins.forEach((w,i)=>{
    const li = document.createElement("li");
    li.innerHTML = `<span class="win-dot ${i===1?'primary':''}"></span><span>${w}</span>`;
    winsList.appendChild(li);
  });
}

function setLastUpdated(){
  const now = new Date();
  const formatted = now.toLocaleString("en-US", {
    month:"short", day:"numeric", year:"numeric",
    hour:"numeric", minute:"2-digit"
  });
  document.getElementById("lastUpdated").textContent = "Last updated: " + formatted;
}

function showError(msg){
  const banner = document.getElementById("errorBanner");
  banner.style.display = "block";
  banner.textContent = msg;
}

function hideError(){
  document.getElementById("errorBanner").style.display = "none";
}

async function loadData(){
  showSkeletons();
  hideError();
  let data;
  try{
    const res = await fetch(CSV_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("Bad response: " + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    if(!parsed.months.length) throw new Error("Empty CSV");
    data = parsed;
  } catch(err){
    console.warn("CSV fetch failed, using fallback data:", err);
    showError("Live data unavailable — showing fallback data.");
    data = FALLBACK;
  }

  buildKPIs(data);
  buildCharts(data);
  buildWins(data);
  setLastUpdated();
}

document.getElementById("refreshBtn").addEventListener("click", async function(){
  const btn = this;
  btn.classList.add("spinning");
  btn.disabled = true;
  await loadData();
  btn.classList.remove("spinning");
  btn.disabled = false;
});

loadData();
</script>
</body>
</html>
